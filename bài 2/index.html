<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quản lý công việc cá nhân</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Quản lý công việc cá nhân</h1>
    <button id="openFormBtn" class="btn primary">Thêm công việc</button>
  </header>

  <main class="container">
    <section class="stats">
      <div class="stat">Tổng: <span id="totalCount">0</span></div>
      <div class="stat">Hoàn thành: <span id="doneCount">0</span></div>
      <div class="stat">Chưa hoàn thành: <span id="todoCount">0</span></div>
    </section>

    <section id="taskList" class="task-list">
      <!-- tasks will be rendered here -->
    </section>
  </main>

  <div id="message" class="message hidden"></div>

  <!-- Modal form -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeFormBtn" class="close">×</button>
      <h2 id="modalTitle">Thêm công việc</h2>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <label>Tiêu đề
          <input id="title" required maxlength="100" />
        </label>
        <label>Mô tả ngắn
          <textarea id="description" rows="3" maxlength="300"></textarea>
        </label>
        <label>Hạn hoàn thành
          <input id="dueDate" type="date" />
        </label>
        <label>Mức ưu tiên
          <select id="priority">
            <option value="low">Thấp</option>
            <option value="medium" selected>Trung bình</option>
            <option value="high">Cao</option>
          </select>
        </label>
        <label class="row">Hoàn thành
          <input id="completed" type="checkbox" />
        </label>

        <div class="form-actions">
          <button type="submit" class="btn primary">Lưu</button>
          <button type="button" id="cancelBtn" class="btn">Hủy</button>
        </div>
      </form>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
