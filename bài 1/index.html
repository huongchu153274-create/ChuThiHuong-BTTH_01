<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sinh viên</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Quản lý sinh viên</h1>
    </header>

    <div class="controls">
        <div>
            <button id="btnAdd">Thêm sinh viên</button>
        </div>
        <div class="stats" id="statsArea">
            Tổng: <span id="totalCount">0</span> | Điểm TB: <span id="avgScore">0.00</span>
        </div>
    </div>

    <div id="notification" class="notification info"></div>

    <table class="student-table">
        <thead>
            <tr>
                <th>Mã SV</th>
                <th>Họ và tên</th>
                <th>Ngày sinh</th>
                <th>Lớp</th>
                <th>Điểm TB</th>
                <th>Email</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="student-tbody">
            <!-- Rows injected by JS -->
        </tbody>
    </table>

    <!-- Modal / Popup form -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal" class="close" title="Đóng">×</button>
            <h2 id="modal-title">Thêm sinh viên</h2>
            <form id="student-form">
                <input type="hidden" id="form-mode" value="add">
                <input type="hidden" id="edit-index" value="-1">

                <div class="form-row">
                    <label for="student-id">Mã sinh viên</label>
                    <input id="student-id" required />
                </div>

                <div class="form-row">
                    <label for="student-name">Họ và tên</label>
                    <input id="student-name" required />
                </div>

                <div class="form-row">
                    <label for="student-dob">Ngày sinh</label>
                    <input id="student-dob" type="date" required />
                </div>

                <div class="form-row">
                    <label for="student-class">Lớp học</label>
                    <input id="student-class" required />
                </div>

                <div class="form-row">
                    <label for="student-gpa">Điểm trung bình</label>
                    <input id="student-gpa" type="number" step="0.01" min="0" max="10" required />
                </div>

                <div class="form-row">
                    <label for="student-email">Email</label>
                    <input id="student-email" type="email" />
                </div>

                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="secondary">Hủy</button>
                    <button type="submit" id="saveBtn" class="primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
